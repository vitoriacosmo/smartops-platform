name: Python Services CI

on:
  push:
    branches: [main]
    paths:
      - 'analytics-service/**'
      - 'ai-insights-service/**'
  pull_request:
    branches: [main]
    paths:
      - 'analytics-service/**'
      - 'ai-insights-service/**'
  workflow_dispatch:

jobs:
  analytics-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: ./analytics-service

      - name: Check syntax
        run: python -m py_compile app/main.py app/consumer.py app/metrics.py
        working-directory: ./analytics-service

  ai-insights-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: ./ai-insights-service

      - name: Check syntax
        run: python -m py_compile app/main.py app/insights.py
        working-directory: ./ai-insights-service